services:
  webserver:
    container_name: belvedereapp
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"              # internal only — Caddy handles public access
    environment:
      - DBHOST=${DBHOST}
      - DBNAME=${DBNAME}
      - DBUSERNAME=${DBUSERNAME}
      - DBPORT=${DBPORT}
      - DBSSLMODE=${DBSSLMODE}
      - DBPASSWORD=${DBPASSWORD}
    networks:
      - public-net        # Caddy needs to reach it
      - infra-net         # needs to reach postgres
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public-net:
    external: true
  infra-net:
    external: true
